<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Triangle Tech</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, sans-serif;
}

.hero {
  position: absolute;
  left: 8%;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 58px;
  margin: 0;
  color: #111;
}

.hero p {
  color: #666;
  margin-top: 8px;
}

.brand {
  position: absolute;
  bottom: 20px;
  left: 8%;
  font-size: 14px;
  color: #444;
}

button {
  margin-top: 15px;
  margin-right: 10px;
  padding: 10px 18px;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Triangle Tech</h1>
  <p>Your number one programming company</p>
  <button onclick="downloadImage()">Download Image</button>
  <button onclick="toggleRecording()">Record Video</button>
</div>

<div class="brand">© Triangle Tech</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

// Renderer (important for recording)
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.9));

const light = new THREE.PointLight(0x88ccff, 1.5);
light.position.set(5,5,5);
scene.add(light);

// Group
const group = new THREE.Group();
scene.add(group);

// Artistic slices
const slices = [];
const total = 10;
const radius = 2;

for(let i=0;i<total;i++){
  const start = (i/total)*Math.PI*2;
  const end = ((i+1)/total)*Math.PI*2;

  const shape = new THREE.Shape();
  shape.moveTo(0,0);
  shape.absarc(0,0,radius,start,end,false);
  shape.lineTo(0,0);

  const geo = new THREE.ExtrudeGeometry(shape,{
    depth:0.35,
    bevelEnabled:true,
    bevelSize:0.04
  });

  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(`hsl(${i*36}, 70%, 80%)`),
    roughness:0.3,
    metalness:0.2
  });

  const mesh = new THREE.Mesh(geo,mat);

  mesh.scale.set(0.001,0.001,0.001);
  mesh.position.z = -2;

  group.add(mesh);
  slices.push(mesh);
}

// Mouse interaction
let mx=0,my=0;
window.addEventListener("mousemove",(e)=>{
  mx = (e.clientX/innerWidth - 0.5);
  my = (e.clientY/innerHeight - 0.5);
});

// Animation
let t = 0;

function animate(){
  requestAnimationFrame(animate);
  t += 0.02;

  slices.forEach((s,i)=>{
    const delay = i * 0.15;
    const p = Math.max(0, Math.min(1, t - delay));

    s.scale.set(p,p,p);
    s.position.z = -2 + p * 2;

    // artistic breathing
    s.rotation.z += 0.003 + Math.sin(t + i)*0.002;
  });

  // group movement
  group.rotation.y += 0.002;

  // smooth mouse effect
  group.rotation.x += (my * 0.4 - group.rotation.x)*0.05;
  group.rotation.y += (mx * 0.4 - group.rotation.y)*0.05;

  renderer.render(scene,camera);
}

animate();

// Download image
function downloadImage(){
  const link = document.createElement('a');
  link.download = 'triangle-tech.png';
  link.href = renderer.domElement.toDataURL();
  link.click();
}

// VIDEO RECORDING
let mediaRecorder;
let recordedChunks = [];
let recording = false;

function toggleRecording(){
  if(!recording){
    const stream = renderer.domElement.captureStream(30);
    mediaRecorder = new MediaRecorder(stream);

    recordedChunks = [];

    mediaRecorder.ondataavailable = e=>{
      if(e.data.size > 0){
        recordedChunks.push(e.data);
      }
    };

    mediaRecorder.onstop = ()=>{
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'triangle-tech.webm';
      a.click();
    };

    mediaRecorder.start();
    recording = true;
    alert("Recording started");
  } else {
    mediaRecorder.stop();
    recording = false;
    alert("Recording saved");
  }
}

// Resize
window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
