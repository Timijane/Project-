<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pi Style Clean</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, sans-serif;
}

.hero {
  position: absolute;
  left: 8%;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 60px;
  margin: 0;
  color: #111;
}

.hero p {
  color: #666;
}

button {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Pi Motion</h1>
  <p>Simple. Artistic. Alive.</p>
  <button onclick="downloadImage()">Download</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// Group
const group = new THREE.Group();
scene.add(group);

// Create slices
const slices = [];
const total = 8;
const radius = 2;

for(let i=0;i<total;i++){
  const start = (i/total)*Math.PI*2;
  const end = ((i+1)/total)*Math.PI*2;

  const shape = new THREE.Shape();
  shape.moveTo(0,0);
  shape.absarc(0,0,radius,start,end,false);
  shape.lineTo(0,0);

  const geo = new THREE.ExtrudeGeometry(shape,{
    depth:0.3,
    bevelEnabled:true,
    bevelSize:0.05
  });

  const mat = new THREE.MeshStandardMaterial({
    color: 0xeeeeee,
    metalness:0.2,
    roughness:0.3
  });

  const mesh = new THREE.Mesh(geo,mat);

  mesh.rotation.z = start;
  mesh.position.z = -2;

  group.add(mesh);
  slices.push(mesh);
}

// Mouse interaction
let mx = 0, my = 0;

window.addEventListener("mousemove",(e)=>{
  mx = (e.clientX/innerWidth - 0.5);
  my = (e.clientY/innerHeight - 0.5);
});

// Animate
let t = 0;

function animate(){
  requestAnimationFrame(animate);
  t += 0.02;

  slices.forEach((s,i)=>{
    const delay = i * 0.2;
    const progress = Math.max(0, Math.min(1, t - delay));

    // smooth appearance
    s.scale.set(progress, progress, progress);
    s.position.z = -2 + progress * 2;

    // subtle wave motion
    s.rotation.z += 0.005;
  });

  // group motion
  group.rotation.y += 0.003;

  // mouse influence
  group.rotation.x += (my * 0.5 - group.rotation.x) * 0.05;
  group.rotation.y += (mx * 0.5 - group.rotation.y) * 0.05;

  renderer.render(scene,camera);
}

animate();

// Download function
function downloadImage(){
  const link = document.createElement('a');
  link.download = 'pi-style.png';
  link.href = renderer.domElement.toDataURL();
  link.click();
}

// Resize
window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
