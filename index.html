<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI CORE</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, sans-serif;
}

.hero {
  position: absolute;
  left: 8%;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 72px;
  margin: 0;
  color: #111;
}

.hero p {
  color: #666;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>AI Core</h1>
  <p>Alive. Thinking. Evolving.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 8;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const glowLight = new THREE.PointLight(0x66ccff, 3, 50);
scene.add(glowLight);

// CORE ORB
const coreGeo = new THREE.SphereGeometry(1.2, 64, 64);
const coreMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 1,
  roughness: 0,
  thickness: 2,
  emissive: 0x66ccff,
  emissiveIntensity: 0.5
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// ORBIT GROUP
const group = new THREE.Group();
scene.add(group);

// SLICES
const slices = [];
for (let i=0; i<12; i++){
  const geo = new THREE.TorusGeometry(2.5, 0.05, 16, 100);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x99ccff,
    emissive: 0x3399ff,
    emissiveIntensity: 1
  });

  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = Math.random()*Math.PI;
  ring.rotation.y = Math.random()*Math.PI;

  group.add(ring);
  slices.push(ring);
}

// PARTICLES
const particlesGeo = new THREE.BufferGeometry();
const count = 1000;
const positions = [];

for(let i=0;i<count;i++){
  positions.push(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20
  );
}

particlesGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const particlesMat = new THREE.PointsMaterial({
  size: 0.03,
  color: 0x88ccff
});

const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

// MOUSE
let mouseX=0, mouseY=0;
window.addEventListener("mousemove", e=>{
  mouseX = (e.clientX/innerWidth - 0.5);
  mouseY = (e.clientY/innerHeight - 0.5);
});

// SCROLL
let scrollY = 0;
window.addEventListener("scroll", ()=>{
  scrollY = window.scrollY;
});

// AUDIO REACTIVE
let audioScale = 1;

navigator.mediaDevices.getUserMedia({ audio:true }).then(stream=>{
  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  const mic = ctx.createMediaStreamSource(stream);

  mic.connect(analyser);
  analyser.fftSize = 64;

  const data = new Uint8Array(analyser.frequencyBinCount);

  function updateAudio(){
    analyser.getByteFrequencyData(data);
    let sum = data.reduce((a,b)=>a+b,0);
    audioScale = 1 + sum / 5000;
    requestAnimationFrame(updateAudio);
  }
  updateAudio();
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  // CORE PULSE
  const scale = 1 + Math.sin(Date.now()*0.003)*0.05 * audioScale;
  core.scale.set(scale, scale, scale);

  // ROTATION
  group.rotation.x += 0.002;
  group.rotation.y += 0.003;

  // MOUSE FOLLOW
  camera.position.x += (mouseX*2 - camera.position.x)*0.05;
  camera.position.y += (-mouseY*2 - camera.position.y)*0.05;

  camera.lookAt(scene.position);

  // SCROLL ZOOM
  camera.position.z = 8 - scrollY * 0.005;

  // PARTICLE MOTION
  particles.rotation.y += 0.0005;

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
