<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FINAL GOD MODE AI</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, sans-serif;
}

.hero {
  position: absolute;
  left: 6%;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 80px;
  margin: 0;
  color: #111;
}

.hero p {
  color: #666;
}
</style>
</head>

<body>

<div class="hero">
  <h1>AI Consciousness</h1>
  <p>Beyond imagination.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 9;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const glow = new THREE.PointLight(0x66ccff, 3, 100);
scene.add(glow);

// CORE (HIGH DETAIL)
const geo = new THREE.IcosahedronGeometry(2, 40);
const mat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0x3399ff,
  emissiveIntensity: 1,
  wireframe: false
});

const core = new THREE.Mesh(geo, mat);
scene.add(core);

// DISTORTION ENGINE (LIQUID)
const pos = geo.attributes.position;

function distort(t){
  for(let i=0;i<pos.count;i++){
    let x = pos.getX(i);
    let y = pos.getY(i);
    let z = pos.getZ(i);

    const wave =
      Math.sin(x*3 + t) * 0.15 +
      Math.cos(y*3 + t) * 0.15;

    pos.setXYZ(i,
      x + wave,
      y + wave,
      z + wave
    );
  }
  pos.needsUpdate = true;
}

// PARTICLE ORBIT FIELD
const particlesGeo = new THREE.BufferGeometry();
const count = 1500;
const arr = [];

for(let i=0;i<count;i++){
  arr.push(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20
  );
}

particlesGeo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));

const particlesMat = new THREE.PointsMaterial({
  size: 0.02,
  color: 0x66ccff
});

const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

// NEURAL SYSTEM (EVOLVING)
const nodes = [];
const linesGroup = new THREE.Group();
scene.add(linesGroup);

for(let i=0;i<50;i++){
  const n = new THREE.Mesh(
    new THREE.SphereGeometry(0.04,8,8),
    new THREE.MeshBasicMaterial({color:0x3399ff})
  );

  n.position.set(
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*6
  );

  scene.add(n);
  nodes.push(n);
}

// CONNECT SYSTEM
function connect(){
  linesGroup.clear();

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const d = nodes[i].position.distanceTo(nodes[j].position);
      if(d < 1.8){
        const g = new THREE.BufferGeometry().setFromPoints([
          nodes[i].position,
          nodes[j].position
        ]);

        const l = new THREE.Line(
          g,
          new THREE.LineBasicMaterial({
            color:0x88ccff,
            transparent:true,
            opacity:0.25
          })
        );

        linesGroup.add(l);
      }
    }
  }
}

// INTERACTION
let mx=0,my=0;
window.addEventListener("mousemove", e=>{
  mx = (e.clientX/innerWidth - 0.5);
  my = (e.clientY/innerHeight - 0.5);
});

// RIPPLE EFFECT
window.addEventListener("click", ()=>{
  gsap.to(core.scale, {
    x:1.5, y:1.5, z:1.5,
    duration:0.3,
    yoyo:true,
    repeat:1
  });
});

// SCROLL STORY CAMERA
window.addEventListener("scroll", ()=>{
  const s = window.scrollY;

  gsap.to(camera.position, {
    z: 9 - s*0.01,
    duration:1
  });
});

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  const t = Date.now()*0.001;

  distort(t);

  core.rotation.x += 0.002;
  core.rotation.y += 0.003;

  // PARTICLE FLOW
  particles.rotation.y += 0.0008;

  // NODE MOTION
  nodes.forEach(n=>{
    n.position.x += Math.sin(t + n.position.y)*0.002;
    n.position.y += Math.cos(t + n.position.x)*0.002;
  });

  connect();

  // CAMERA SMOOTH FOLLOW
  camera.position.x += (mx*2 - camera.position.x)*0.05;
  camera.position.y += (-my*2 - camera.position.y)*0.05;

  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
