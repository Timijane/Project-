<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GOD MODE AI</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: -apple-system, sans-serif;
}

.hero {
  position: absolute;
  left: 6%;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 80px;
  margin: 0;
  color: #111;
}

.hero p {
  color: #666;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Conscious AI</h1>
  <p>Thinking beyond code.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 10;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const neon = new THREE.PointLight(0x66ccff, 3, 100);
scene.add(neon);

// CORE (LIQUID EFFECT)
const geo = new THREE.IcosahedronGeometry(2, 20);
const mat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0x3399ff,
  emissiveIntensity: 1,
  wireframe: true
});

const core = new THREE.Mesh(geo, mat);
scene.add(core);

// VERTEX ANIMATION (LIQUID)
const pos = geo.attributes.position;

function distort(time){
  for(let i=0;i<pos.count;i++){
    let x = pos.getX(i);
    let y = pos.getY(i);
    let z = pos.getZ(i);

    const noise = Math.sin(x*2 + time) * Math.sin(y*2 + time) * 0.2;

    pos.setXYZ(i,
      x + noise,
      y + noise,
      z + noise
    );
  }
  pos.needsUpdate = true;
}

// NEURAL NODES
const nodes = [];
const linesGroup = new THREE.Group();
scene.add(linesGroup);

for(let i=0;i<40;i++){
  const nodeGeo = new THREE.SphereGeometry(0.05, 8, 8);
  const nodeMat = new THREE.MeshBasicMaterial({ color: 0x3399ff });

  const node = new THREE.Mesh(nodeGeo, nodeMat);
  node.position.set(
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*6
  );

  scene.add(node);
  nodes.push(node);
}

// CONNECT NODES
function connectNodes(){
  linesGroup.clear();

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dist = nodes[i].position.distanceTo(nodes[j].position);
      if(dist < 2){
        const material = new THREE.LineBasicMaterial({
          color: 0x88ccff,
          transparent:true,
          opacity: 0.3
        });

        const geometry = new THREE.BufferGeometry().setFromPoints([
          nodes[i].position,
          nodes[j].position
        ]);

        const line = new THREE.Line(geometry, material);
        linesGroup.add(line);
      }
    }
  }
}

// MOUSE
let mx=0,my=0;
window.addEventListener("mousemove", e=>{
  mx = (e.clientX/innerWidth - 0.5);
  my = (e.clientY/innerHeight - 0.5);
});

// AUDIO
let audioScale=1;

navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  const mic = ctx.createMediaStreamSource(stream);

  mic.connect(analyser);
  analyser.fftSize = 32;

  const data = new Uint8Array(analyser.frequencyBinCount);

  function update(){
    analyser.getByteFrequencyData(data);
    let avg = data.reduce((a,b)=>a+b)/data.length;
    audioScale = 1 + avg/100;
    requestAnimationFrame(update);
  }
  update();
});

// SCROLL STORY
window.addEventListener("scroll", ()=>{
  const s = window.scrollY;

  gsap.to(camera.position, {
    z: 10 - s * 0.01,
    duration: 1
  });
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  let t = Date.now()*0.001;

  distort(t);

  // CORE ROTATION
  core.rotation.x += 0.002;
  core.rotation.y += 0.003;

  // AUDIO REACTION
  core.scale.set(audioScale, audioScale, audioScale);

  // NODE FLOAT
  nodes.forEach(n=>{
    n.position.x += Math.sin(t + n.position.y)*0.002;
    n.position.y += Math.cos(t + n.position.x)*0.002;
  });

  connectNodes();

  // CAMERA FOLLOW
  camera.position.x += (mx*3 - camera.position.x)*0.05;
  camera.position.y += (-my*3 - camera.position.y)*0.05;

  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
