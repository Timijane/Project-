<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

.grid {
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: linear-gradient(#0ff 1px, transparent 1px),
                    linear-gradient(90deg, #0ff 1px, transparent 1px);
  background-size: 50px 50px;
  transform: perspective(500px) rotateX(60deg);
  animation: wave 5s infinite linear;
}

@keyframes wave {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  50% { transform: perspective(500px) rotateX(60deg) translateY(-50px); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(0); }
}
</style>
</head>
<body>
<div class="grid"></div>
</body>
</html>
