<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Triangle Tech Login</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0f8ff, #ffe4f0);
}

canvas { display: block; }

.login-container {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 320px;
  padding: 30px;
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
}

.login-container h2 {
  margin: 0 0 15px;
  color: #333;
}

.login-container input {
  width: 100%;
  padding: 10px 15px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 16px;
}

.login-container button {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #ff7f50, #1e90ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

.brand {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 14px;
  color: #444;
}

.ceo {
  font-weight: bold;
}
</style>
</head>
<body>

<div class="login-container" id="login">
  <h2>Triangle Tech</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

<div class="brand">© Triangle Tech - <span class="ceo">Okewunmi Timileyin, CEO</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 10;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Particles background
const particleGeo = new THREE.BufferGeometry();
const particleCount = 500;
const positions = [];
for(let i=0;i<particleCount;i++){
  positions.push((Math.random()-0.5)*40);
  positions.push((Math.random()-0.5)*30);
  positions.push((Math.random()-0.5)*20);
}
particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
const particleMat = new THREE.PointsMaterial({color:0xffffff, size:0.15});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Character (circle for simplicity)
const charGeo = new THREE.CircleGeometry(1, 32);
const charMat = new THREE.MeshBasicMaterial({color:0xff69b4});
const character = new THREE.Mesh(charGeo, charMat);
character.position.x = -15; // start offscreen left
character.position.y = 0;
scene.add(character);

// GSAP timeline
const loginBox = document.getElementById('login');

const timeline = gsap.timeline({paused:true});
timeline.to(character.position, {
  x: -3, // approach login
  duration: 2,
  ease: "power2.out"
});
timeline.to(loginBox, {
  opacity: 1,
  duration: 1,
  ease: "power2.inOut"
}, "-=0.5");
timeline.to(character.position, {
  x: -2,
  duration: 0.5,
  ease: "elastic.out(1,0.5)"
});

// Drag interaction
let isDragging = false;
let dragOffset = 0;

renderer.domElement.addEventListener('mousedown', ()=>{
  isDragging = true;
});
renderer.domElement.addEventListener('mouseup', ()=>{
  isDragging = false;
  timeline.play();
});
renderer.domElement.addEventListener('mousemove', e=>{
  if(isDragging){
    const x = (e.clientX/innerWidth - 0.5) * 30;
    character.position.x = x;
  }
});

// Animate particles
function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y += 0.0008;
  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
