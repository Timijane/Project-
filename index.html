<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Gradient Mesh</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: #0a0a0a;
}

.mesh {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #ff00cc, transparent),
              radial-gradient(circle at 70% 60%, #00ccff, transparent),
              radial-gradient(circle at 50% 80%, #6600ff, transparent);
  animation: move 20s infinite linear;
  filter: blur(100px);
}

@keyframes move {
  0% { transform: translate(-25%, -25%) rotate(0deg); }
  50% { transform: translate(-30%, -20%) rotate(180deg); }
  100% { transform: translate(-25%, -25%) rotate(360deg); }
}
</style>
</head>
<body>
<div class="mesh"></div>
</body>
</html>
