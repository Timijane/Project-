<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Drama TV - Cinematic</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow-x: hidden;
  background: black;
  color: white;
}

/* Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Sections */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
}

h1 {
  font-size: 4rem;
  letter-spacing: 2px;
}

p {
  margin-top: 20px;
  font-size: 1.2rem;
  opacity: 0.8;
}

/* Glass UI */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
}

/* Smooth scroll */
html {
  scroll-behavior: smooth;
}
</style>
</head>

<body>

<!-- SECTIONS -->
<section class="section">
  <div class="glass">
    <h1>MR DRAMA TV</h1>
    <p>Cinematic Media Experience</p>
  </div>
</section>

<section class="section">
  <div class="glass">
    <h1>Creative Power</h1>
    <p>Video Production • Editing • Livestream</p>
  </div>
</section>

<section class="section">
  <div class="glass">
    <h1>Next Gen Visuals</h1>
    <p>Immersive storytelling with technology</p>
  </div>
</section>

<section class="section">
  <div class="glass">
    <h1>Let’s Work</h1>
    <p>Bring your vision to life</p>
  </div>
</section>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
/* SCENE SETUP */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* LIGHTING (APPLE STYLE) */
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
light.castShadow = true;
scene.add(light);

/* OBJECTS */

// Main Hero Object (Torus Knot)
const geo = new THREE.TorusKnotGeometry(2, 0.5, 150, 32);
const mat = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
  metalness: 0.8,
  roughness: 0.2
});
const mesh = new THREE.Mesh(geo, mat);
mesh.castShadow = true;
scene.add(mesh);

// Floor for reflections feel
const floorGeo = new THREE.PlaneGeometry(50,50);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x111111,
  roughness: 0.8,
  metalness: 0.2
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = -3;
floor.receiveShadow = true;
scene.add(floor);

// Floating spheres
for(let i=0;i<20;i++){
  const sGeo = new THREE.SphereGeometry(0.2,32,32);
  const sMat = new THREE.MeshStandardMaterial({ color: 0x00ffff });
  const s = new THREE.Mesh(sGeo,sMat);
  s.position.set(
    (Math.random()-0.5)*10,
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*10
  );
  scene.add(s);
}

/* CAMERA */
camera.position.z = 6;

/* MOUSE INTERACTION */
let mouseX = 0;
let mouseY = 0;

document.addEventListener('mousemove', (e)=>{
  mouseX = (e.clientX / window.innerWidth - 0.5);
  mouseY = (e.clientY / window.innerHeight - 0.5);
});

/* SCROLL STORY SYSTEM */
let scrollY = window.scrollY;

window.addEventListener('scroll', ()=>{
  scrollY = window.scrollY;
});

/* ANIMATION LOOP */
function animate(){
  requestAnimationFrame(animate);

  // Rotate object
  mesh.rotation.x += 0.003;
  mesh.rotation.y += 0.005;

  // Mouse parallax
  camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
  camera.position.y += (-mouseY * 2 - camera.position.y) * 0.05;

  // Scroll storytelling (APPLE STYLE)
  const section = scrollY / window.innerHeight;

  if(section < 1){
    mesh.position.y = 0;
    mesh.scale.set(1,1,1);
  }
  else if(section < 2){
    mesh.position.y = -2;
    mesh.scale.set(1.5,1.5,1.5);
  }
  else if(section < 3){
    mesh.position.y = -4;
    mesh.scale.set(2,2,2);
  }
  else{
    mesh.position.y = -6;
    mesh.scale.set(2.5,2.5,2.5);
  }

  renderer.render(scene, camera);
}

animate();

/* RESPONSIVE */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
