<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.orb {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, #00f0ff, #001);
  box-shadow: 0 0 60px #00f0ff;
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% {
    transform: scale(1);
    filter: hue-rotate(0deg);
  }
  50% {
    transform: scale(1.2);
    filter: hue-rotate(180deg);
  }
}
</style>
</head>
<body>

<div class="orb"></div>

</body>
</html>
