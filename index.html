<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Triangle Tech Login</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0f8ff, #ffe4f0);
}

#human {
  position: absolute;
  top: 30%;
  left: -200px; /* start offscreen */
  width: 150px;
  cursor: grab;
  transition: transform 0.2s ease;
  z-index: 10;
}

#loginPanel {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 340px;
  padding: 35px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.15);
  transform: translate(-50%, -50%) scale(0.95);
  opacity: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#loginPanel h2 {
  margin-bottom: 18px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

#loginPanel input {
  width: 100%;
  padding: 12px 18px;
  margin: 10px 0;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.4);
  outline: none;
  font-size: 16px;
  background: rgba(255,255,255,0.2);
  color: #fff;
}

#loginPanel input::placeholder {
  color: rgba(255,255,255,0.7);
}

#loginPanel button {
  padding: 12px 25px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #ff7f50, #1e90ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.brand {
  position: absolute;
  bottom: 18px;
  left: 20px;
  font-size: 14px;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.ceo {
  font-weight: bold;
}
</style>
</head>
<body>

<!-- Human image -->
<img id="human" src="https://i.imgur.com/TzWcihb.png" alt="Human Illustration">

<!-- Login panel -->
<div id="loginPanel">
  <h2>Triangle Tech</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

<div class="brand">© Triangle Tech - <span class="ceo">Okewunmi Timileyin, CEO</span></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
const human = document.getElementById('human');
const loginPanel = document.getElementById('loginPanel');

let isDragging = false;
let offsetX = 0;

// Show login panel smoothly after human starts dragging
function revealPanel() {
  if (loginPanel.style.opacity == 0) {
    gsap.to(loginPanel, {opacity: 1, scale: 1, duration: 1, ease: "power2.out"});
  }
}

// Mouse/touch events
human.addEventListener('mousedown', (e)=>{
  isDragging = true;
  offsetX = e.clientX - human.getBoundingClientRect().left;
  human.style.cursor = 'grabbing';
});

document.addEventListener('mouseup', ()=>{
  if (isDragging) {
    isDragging = false;
    human.style.cursor = 'grab';
    // Snap human to final position & pull panel
    gsap.to(human, {x: window.innerWidth/2 - 100, duration: 0.8, ease:"elastic.out(1,0.5)"});
    gsap.to(loginPanel, {x: window.innerWidth/2 - window.innerWidth/2, duration:0.8, ease:"elastic.out(1,0.5)"});
  }
});

document.addEventListener('mousemove', (e)=>{
  if (isDragging) {
    let x = e.clientX - offsetX;
    human.style.left = x + 'px';
    revealPanel();
  }
});

// Optional: touch events for mobile
human.addEventListener('touchstart', (e)=>{
  isDragging = true;
  offsetX = e.touches[0].clientX - human.getBoundingClientRect().left;
});

document.addEventListener('touchend', ()=>{
  if (isDragging) {
    isDragging = false;
    gsap.to(human, {x: window.innerWidth/2 - 100, duration: 0.8, ease:"elastic.out(1,0.5)"});
    gsap.to(loginPanel, {x: window.innerWidth/2 - window.innerWidth/2, duration:0.8, ease:"elastic.out(1,0.5)"});
  }
});

document.addEventListener('touchmove', (e)=>{
  if (isDragging) {
    let x = e.touches[0].clientX - offsetX;
    human.style.left = x + 'px';
    revealPanel();
  }
});

// Animate slight bounce of human while idle
gsap.to(human, {y: "-=10", duration:1.2, repeat:-1, yoyo:true, ease:"sine.inOut"});
</script>

</body>
</html>
