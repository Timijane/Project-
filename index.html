<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: #050505;
  overflow: hidden;
}

.layer {
  position: absolute;
  width: 300px;
  height: 300px;
  backdrop-filter: blur(40px);
  border-radius: 30px;
  background: rgba(255,255,255,0.05);
  animation: move 15s infinite alternate ease-in-out;
}

.layer:nth-child(1) { top: 10%; left: 20%; }
.layer:nth-child(2) { top: 50%; left: 60%; animation-delay: 3s; }
.layer:nth-child(3) { top: 70%; left: 10%; animation-delay: 6s; }

@keyframes move {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(-100px) rotate(180deg); }
}
</style>
</head>
<body>

<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>

</body>
</html>
